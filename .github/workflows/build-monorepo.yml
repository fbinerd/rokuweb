name: Build Monorepo

on:
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $major = (Get-Content manifest | Where-Object { $_ -like 'major_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $minor = (Get-Content manifest | Where-Object { $_ -like 'minor_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $build = (Get-Content manifest | Where-Object { $_ -like 'build_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $version = "$major.$minor.$build"
          $sha = (git rev-parse --short HEAD).Trim()
          $releaseId = "$version-$sha"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_id=$releaseId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build super
        shell: pwsh
        working-directory: ./super
        run: ./build.ps1 -Restore -Build

      - name: Package rokuweb
        shell: pwsh
        run: ./package.ps1

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/New-ReleaseArtifacts.ps1

      - name: Upload Roku package
        uses: actions/upload-artifact@v4
        with:
          name: rokuweb-package-${{ steps.meta.outputs.release_id }}
          path: hello-roku.zip
          if-no-files-found: error

      - name: Upload super release
        uses: actions/upload-artifact@v4
        with:
          name: super-release-${{ steps.meta.outputs.release_id }}
          path: super/src/WindowManager.App/bin/Release/**
          if-no-files-found: error

      - name: Upload versioned release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: versioned-release-artifacts-${{ steps.meta.outputs.release_id }}
          path: dist/**
          if-no-files-found: error

      - name: Upload latest rokuweb manifest
        uses: actions/upload-artifact@v4
        with:
          name: latest-rokuweb-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-rokuweb.json
          if-no-files-found: error

      - name: Upload latest super manifest
        uses: actions/upload-artifact@v4
        with:
          name: latest-super-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-super.json
          if-no-files-found: error

      - name: Prepare Pages content
        shell: pwsh
        run: |
          $pagesRoot = Join-Path $PWD "pages-content"
          $updatesRoot = Join-Path $pagesRoot "updates"
          if (Test-Path $pagesRoot) {
            Remove-Item -Recurse -Force $pagesRoot
          }
          New-Item -ItemType Directory -Path $updatesRoot -Force | Out-Null
          Copy-Item -Path dist\* -Destination $updatesRoot -Recurse -Force
          @"
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>rokuweb updates</title>
          </head>
          <body>
            <h1>rokuweb updates</h1>
            <ul>
              <li><a href="./updates/latest-rokuweb.json">latest-rokuweb.json</a></li>
              <li><a href="./updates/latest-super.json">latest-super.json</a></li>
            </ul>
          </body>
          </html>
          "@ | Set-Content -Path (Join-Path $pagesRoot "index.html") -Encoding UTF8

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-content

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
