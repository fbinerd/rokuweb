name: Build Monorepo

on:
  push:
    branches:
      - stable
      - develop
  pull_request:
    branches:
      - stable
      - develop
  workflow_dispatch:
    inputs:
      channels:
        description: "Canais para compilar"
        required: false
        default: "current"
        type: choice
        options:
          - current
          - stable
          - develop
          - both
      artifact_mode:
        description: "Quantidade de artifacts do run"
        required: false
        default: "minimal"
        type: choice
        options:
          - minimal
          - full

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-builds:
    runs-on: ubuntu-latest
    outputs:
      build_stable: ${{ steps.flags.outputs.build_stable }}
      build_develop: ${{ steps.flags.outputs.build_develop }}
      artifact_mode: ${{ steps.flags.outputs.artifact_mode }}
    steps:
      - name: Resolve channel builds
        id: flags
        shell: bash
        run: |
          set -euo pipefail
          build_stable=false
          build_develop=false
          artifact_mode=minimal

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected_channels="${{ github.event.inputs.channels }}"
            artifact_mode="${{ github.event.inputs.artifact_mode }}"
            if [ "$selected_channels" = "both" ]; then
              build_stable=true
              build_develop=true
            elif [ "$selected_channels" = "stable" ]; then
              build_stable=true
            elif [ "$selected_channels" = "develop" ]; then
              build_develop=true
            else
              if [ "${{ github.ref_name }}" = "stable" ]; then
                build_stable=true
              elif [ "${{ github.ref_name }}" = "develop" ]; then
                build_develop=true
              fi
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref_name }}" = "stable" ]; then
              build_stable=true
            fi
            if [ "${{ github.ref_name }}" = "develop" ]; then
              build_develop=true
            fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" = "stable" ]; then
              build_stable=true
            fi
            if [ "${{ github.base_ref }}" = "develop" ]; then
              build_develop=true
            fi
          fi

          echo "build_stable=$build_stable" >> "$GITHUB_OUTPUT"
          echo "build_develop=$build_develop" >> "$GITHUB_OUTPUT"
          echo "artifact_mode=$artifact_mode" >> "$GITHUB_OUTPUT"

  build-stable:
    runs-on: windows-latest
    needs: resolve-builds
    if: needs.resolve-builds.outputs.build_stable == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout stable
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: stable

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $major = (Get-Content manifest | Where-Object { $_ -like 'major_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $minor = (Get-Content manifest | Where-Object { $_ -like 'minor_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $build = (Get-Content manifest | Where-Object { $_ -like 'build_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $version = "$major.$minor.$build"
          $sha = (git rev-parse --short HEAD).Trim()
          $releaseId = "$version-$sha"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_id=$releaseId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build super
        shell: pwsh
        working-directory: ./super
        run: ./build.ps1 -Restore -Build

      - name: Build SuperPainel installer
        shell: pwsh
        working-directory: ./super
        run: |
          ./Build-Installer.ps1 `
            -ReleaseRoot '.\src\WindowManager.App\bin\Release\net481' `
            -OutputPath '..\stable-superpainel-installer.zip' `
            -Version '${{ steps.meta.outputs.version }}' `
            -ReleaseId '${{ steps.meta.outputs.release_id }}' `
            -Channel 'stable'

      - name: Package rokuweb
        shell: pwsh
        run: ./package.ps1 -Channel 'stable' -Output 'stable-roku.zip'

      - name: Build release artifacts
        shell: pwsh
        run: |
          $fullUrl = 'https://github.com/${{ github.repository }}/releases/download/stable-super-full-latest/stable-super-latest-full.zip'
          ./scripts/New-ReleaseArtifacts.ps1 -Channel 'stable' -BaseUrl 'https://fbinerd.github.io/rokuweb/updates/stable/' -SuperCurrentFullPackageUrl $fullUrl

      - name: Publish stable super full package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseTag = 'stable-super-full-latest'
          $releaseTitle = 'stable super full latest'
          $assetPath = Join-Path $PWD ('dist\stable-super-{0}-full.zip' -f '${{ steps.meta.outputs.release_id }}')
          if (-not (Test-Path $assetPath)) {
            throw "Pacote full do super nao encontrado: $assetPath"
          }

          gh release view $releaseTag --repo '${{ github.repository }}' *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $releaseTag $assetPath#stable-super-latest-full.zip --title $releaseTitle --notes 'Pacote full mais recente do canal stable.' --repo '${{ github.repository }}'
          }
          else {
            gh release upload $releaseTag $assetPath#stable-super-latest-full.zip --clobber --repo '${{ github.repository }}'
          }

      - name: Remove stable super full package from Pages payload
        shell: pwsh
        run: |
          $assetPath = Join-Path $PWD ('dist\stable-super-{0}-full.zip' -f '${{ steps.meta.outputs.release_id }}')
          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }

      - name: Prepare patch artifact content
        shell: pwsh
        run: |
          $patchRoot = Join-Path $PWD "patch-artifacts"
          if (Test-Path $patchRoot) {
            Remove-Item -Recurse -Force $patchRoot
          }
          New-Item -ItemType Directory -Path $patchRoot -Force | Out-Null
          Copy-Item -Path dist\*-delta-from-*.zip -Destination $patchRoot -Force -ErrorAction SilentlyContinue
          Copy-Item -Path dist\*-changes.json -Destination $patchRoot -Force

      - name: Upload Roku package
        uses: actions/upload-artifact@v4
        with:
          name: stable-roku-package-${{ steps.meta.outputs.release_id }}
          path: stable-roku.zip
          if-no-files-found: error

      - name: Upload SuperPainel installer
        uses: actions/upload-artifact@v4
        with:
          name: stable-superpainel-installer-${{ steps.meta.outputs.release_id }}
          path: stable-superpainel-installer.zip
          if-no-files-found: error

      - name: Upload super release
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: stable-super-release-${{ steps.meta.outputs.release_id }}
          path: super/src/WindowManager.App/bin/Release/**
          if-no-files-found: error

      - name: Upload patch debug artifacts
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: stable-patch-debug-artifacts-${{ steps.meta.outputs.release_id }}
          path: patch-artifacts/**
          if-no-files-found: error

      - name: Upload latest rokuweb manifest
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: stable-latest-rokuweb-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-rokuweb.json
          if-no-files-found: error

      - name: Upload latest super manifest
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: stable-latest-super-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-super.json
          if-no-files-found: error

      - name: Upload pages source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-source-stable
          path: dist/**
          if-no-files-found: error

  build-develop:
    runs-on: windows-latest
    needs: resolve-builds
    if: needs.resolve-builds.outputs.build_develop == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: develop

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $major = (Get-Content manifest | Where-Object { $_ -like 'major_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $minor = (Get-Content manifest | Where-Object { $_ -like 'minor_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $build = (Get-Content manifest | Where-Object { $_ -like 'build_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $version = "$major.$minor.$build"
          $sha = (git rev-parse --short HEAD).Trim()
          $releaseId = "$version-$sha"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_id=$releaseId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build super
        shell: pwsh
        working-directory: ./super
        run: ./build.ps1 -Restore -Build

      - name: Build SuperPainel installer
        shell: pwsh
        working-directory: ./super
        run: |
          ./Build-Installer.ps1 `
            -ReleaseRoot '.\src\WindowManager.App\bin\Release\net481' `
            -OutputPath '..\develop-superpainel-installer.zip' `
            -Version '${{ steps.meta.outputs.version }}' `
            -ReleaseId '${{ steps.meta.outputs.release_id }}' `
            -Channel 'develop'

      - name: Package rokuweb
        shell: pwsh
        run: ./package.ps1 -Channel 'develop' -Output 'develop-roku.zip'

      - name: Build release artifacts
        shell: pwsh
        run: |
          $fullUrl = 'https://github.com/${{ github.repository }}/releases/download/develop-super-full-latest/develop-super-latest-full.zip'
          ./scripts/New-ReleaseArtifacts.ps1 -Channel 'develop' -BaseUrl 'https://fbinerd.github.io/rokuweb/updates/develop/' -SuperCurrentFullPackageUrl $fullUrl

      - name: Publish develop super full package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseTag = 'develop-super-full-latest'
          $releaseTitle = 'develop super full latest'
          $assetPath = Join-Path $PWD ('dist\develop-super-{0}-full.zip' -f '${{ steps.meta.outputs.release_id }}')
          if (-not (Test-Path $assetPath)) {
            throw "Pacote full do super nao encontrado: $assetPath"
          }

          gh release view $releaseTag --repo '${{ github.repository }}' *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $releaseTag $assetPath#develop-super-latest-full.zip --title $releaseTitle --notes 'Pacote full mais recente do canal develop.' --repo '${{ github.repository }}'
          }
          else {
            gh release upload $releaseTag $assetPath#develop-super-latest-full.zip --clobber --repo '${{ github.repository }}'
          }

      - name: Remove develop super full package from Pages payload
        shell: pwsh
        run: |
          $assetPath = Join-Path $PWD ('dist\develop-super-{0}-full.zip' -f '${{ steps.meta.outputs.release_id }}')
          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }

      - name: Prepare patch artifact content
        shell: pwsh
        run: |
          $patchRoot = Join-Path $PWD "patch-artifacts"
          if (Test-Path $patchRoot) {
            Remove-Item -Recurse -Force $patchRoot
          }
          New-Item -ItemType Directory -Path $patchRoot -Force | Out-Null
          Copy-Item -Path dist\*-delta-from-*.zip -Destination $patchRoot -Force -ErrorAction SilentlyContinue
          Copy-Item -Path dist\*-changes.json -Destination $patchRoot -Force

      - name: Upload Roku package
        uses: actions/upload-artifact@v4
        with:
          name: develop-roku-package-${{ steps.meta.outputs.release_id }}
          path: develop-roku.zip
          if-no-files-found: error

      - name: Upload SuperPainel installer
        uses: actions/upload-artifact@v4
        with:
          name: develop-superpainel-installer-${{ steps.meta.outputs.release_id }}
          path: develop-superpainel-installer.zip
          if-no-files-found: error

      - name: Upload super release
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: develop-super-release-${{ steps.meta.outputs.release_id }}
          path: super/src/WindowManager.App/bin/Release/**
          if-no-files-found: error

      - name: Upload patch debug artifacts
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: develop-patch-debug-artifacts-${{ steps.meta.outputs.release_id }}
          path: patch-artifacts/**
          if-no-files-found: error

      - name: Upload latest rokuweb manifest
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: develop-latest-rokuweb-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-rokuweb.json
          if-no-files-found: error

      - name: Upload latest super manifest
        if: needs.resolve-builds.outputs.artifact_mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: develop-latest-super-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-super.json
          if-no-files-found: error

      - name: Upload pages source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-source-develop
          path: dist/**
          if-no-files-found: error

  publish-pages:
    runs-on: ubuntu-latest
    needs:
      - resolve-builds
      - build-stable
      - build-develop
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (
        needs.build-stable.result == 'success' ||
        needs.build-stable.result == 'skipped'
      ) &&
      (
        needs.build-develop.result == 'success' ||
        needs.build-develop.result == 'skipped'
      ) &&
      (
        needs.resolve-builds.outputs.build_stable == 'true' ||
        needs.resolve-builds.outputs.build_develop == 'true'
      )

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download stable pages source
        if: needs.resolve-builds.outputs.build_stable == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pages-source-stable
          path: pages-source-stable

      - name: Download develop pages source
        if: needs.resolve-builds.outputs.build_develop == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pages-source-develop
          path: pages-source-develop

      - name: Prepare Pages content
        shell: bash
        run: |
          set -euo pipefail
          pages_root="$PWD/pages-content"
          updates_root="$pages_root/updates"
          base_url="https://fbinerd.github.io/rokuweb/updates"

          fetch_channel_from_pages() {
            channel="$1"
            channel_root="$updates_root/$channel"
            channel_url="$base_url/$channel"
            index_url="$channel_url/channel-file-index.json"

            mkdir -p "$channel_root"

            if curl --fail --silent --show-error "$index_url" -o "$channel_root/channel-file-index.json"; then
              python3 -c "import json, pathlib, sys, urllib.request; index_path = pathlib.Path(sys.argv[1]); channel_root = pathlib.Path(sys.argv[2]); channel_url = sys.argv[3].rstrip('/'); data = json.loads(index_path.read_text(encoding='utf-8')); [urllib.request.urlretrieve(f'{channel_url}/{relative.strip(\"/\")}', (channel_root / relative.strip('/')).parent.mkdir(parents=True, exist_ok=True) or (channel_root / relative.strip('/'))) for relative in data.get('files', [])]" "$channel_root/channel-file-index.json" "$channel_root" "$channel_url"
              return 0
            fi

            rm -f "$channel_root/channel-file-index.json"

            if curl --fail --silent --show-error "$channel_url/latest-super.json" -o "$channel_root/latest-super.json" && \
               curl --fail --silent --show-error "$channel_url/latest-rokuweb.json" -o "$channel_root/latest-rokuweb.json"; then
              return 0
            fi

            return 1
          }

          write_channel_index() {
            channel="$1"
            channel_root="$updates_root/$channel"

            python3 -c "import json, pathlib, sys; channel_root = pathlib.Path(sys.argv[1]); files = [path.relative_to(channel_root).as_posix() for path in sorted(channel_root.rglob('*')) if path.is_file()]; (channel_root / 'channel-file-index.json').write_text(json.dumps({'files': files}, indent=2), encoding='utf-8')" "$channel_root"
          }

          rm -rf "$pages_root"
          mkdir -p "$updates_root/stable" "$updates_root/develop"

          if [ -d "pages-source-stable" ]; then
            rm -rf "$updates_root/stable"
            mkdir -p "$updates_root/stable"
            cp -a pages-source-stable/. "$updates_root/stable/"
          fi

          if [ -d "pages-source-develop" ]; then
            rm -rf "$updates_root/develop"
            mkdir -p "$updates_root/develop"
            cp -a pages-source-develop/. "$updates_root/develop/"
          fi

          if [ ! -f "$updates_root/stable/latest-super.json" ]; then
            fetch_channel_from_pages "stable" || {
              echo "Canal stable ausente no conteudo montado do Pages."
              exit 1
            }
          fi

          if [ ! -f "$updates_root/develop/latest-super.json" ]; then
            fetch_channel_from_pages "develop" || {
              echo "Canal develop ausente no conteudo montado do Pages."
              exit 1
            }
          fi

          if [ ! -f "$updates_root/stable/latest-rokuweb.json" ] || [ ! -f "$updates_root/develop/latest-rokuweb.json" ]; then
            echo "Artifacts de Pages dos canais stable/develop nao foram encontrados."
            exit 1
          fi

          write_channel_index "stable"
          write_channel_index "develop"

          cp "$updates_root/stable/latest-rokuweb.json" "$updates_root/latest-rokuweb.json"
          cp "$updates_root/stable/latest-super.json" "$updates_root/latest-super.json"

          cat > "$pages_root/index.html" <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>rokuweb updates</title>
          </head>
          <body>
            <h1>rokuweb updates</h1>
            <ul>
              <li><a href="./updates/stable/latest-rokuweb.json">stable/latest-rokuweb.json</a></li>
              <li><a href="./updates/stable/latest-super.json">stable/latest-super.json</a></li>
              <li><a href="./updates/develop/latest-rokuweb.json">develop/latest-rokuweb.json</a></li>
              <li><a href="./updates/develop/latest-super.json">develop/latest-super.json</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-content

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
