name: Build Monorepo

on:
  push:
    branches:
      - stable
      - develop
  pull_request:
    branches:
      - stable
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $major = (Get-Content manifest | Where-Object { $_ -like 'major_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $minor = (Get-Content manifest | Where-Object { $_ -like 'minor_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $build = (Get-Content manifest | Where-Object { $_ -like 'build_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $version = "$major.$minor.$build"
          $sha = (git rev-parse --short HEAD).Trim()
          $releaseId = "$version-$sha"
          $channel = "${{ github.ref_name }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_id=$releaseId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build super
        shell: pwsh
        working-directory: ./super
        run: ./build.ps1 -Restore -Build

      - name: Package rokuweb
        shell: pwsh
        run: ./package.ps1 -Channel '${{ steps.meta.outputs.channel }}' -Output '${{ steps.meta.outputs.channel }}-roku.zip'

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/New-ReleaseArtifacts.ps1 -Channel '${{ steps.meta.outputs.channel }}' -BaseUrl 'https://fbinerd.github.io/rokuweb/updates/${{ steps.meta.outputs.channel }}/'

      - name: Prepare patch artifact content
        shell: pwsh
        run: |
          $patchRoot = Join-Path $PWD "patch-artifacts"
          if (Test-Path $patchRoot) {
            Remove-Item -Recurse -Force $patchRoot
          }
          New-Item -ItemType Directory -Path $patchRoot -Force | Out-Null
          Copy-Item -Path dist\*-delta-from-*.zip -Destination $patchRoot -Force -ErrorAction SilentlyContinue
          Copy-Item -Path dist\*-changes.json -Destination $patchRoot -Force

      - name: Upload Roku package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-roku-package-${{ steps.meta.outputs.release_id }}
          path: ${{ steps.meta.outputs.channel }}-roku.zip
          if-no-files-found: error

      - name: Upload super release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-super-release-${{ steps.meta.outputs.release_id }}
          path: super/src/WindowManager.App/bin/Release/**
          if-no-files-found: error

      - name: Upload versioned release patch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-versioned-release-artifacts-${{ steps.meta.outputs.release_id }}
          path: patch-artifacts/**
          if-no-files-found: error

      - name: Upload latest rokuweb manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-latest-rokuweb-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-rokuweb.json
          if-no-files-found: error

      - name: Upload latest super manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-latest-super-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-super.json
          if-no-files-found: error

      - name: Upload pages source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-source-${{ steps.meta.outputs.channel }}
          path: dist/**
          if-no-files-found: error
