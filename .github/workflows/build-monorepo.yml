name: Build Monorepo

on:
  push:
    branches:
      - stable
      - develop
  pull_request:
    branches:
      - stable
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $major = (Get-Content manifest | Where-Object { $_ -like 'major_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $minor = (Get-Content manifest | Where-Object { $_ -like 'minor_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $build = (Get-Content manifest | Where-Object { $_ -like 'build_version=*' } | Select-Object -First 1).Split('=')[1].Trim()
          $version = "$major.$minor.$build"
          $sha = (git rev-parse --short HEAD).Trim()
          $releaseId = "$version-$sha"
          $channel = "${{ github.ref_name }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_id=$releaseId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build super
        shell: pwsh
        working-directory: ./super
        run: ./build.ps1 -Restore -Build

      - name: Package rokuweb
        shell: pwsh
        run: ./package.ps1 -Channel '${{ steps.meta.outputs.channel }}' -Output '${{ steps.meta.outputs.channel }}-roku.zip'

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/New-ReleaseArtifacts.ps1 -Channel '${{ steps.meta.outputs.channel }}' -BaseUrl 'https://fbinerd.github.io/rokuweb/updates/${{ steps.meta.outputs.channel }}/'

      - name: Prepare patch artifact content
        shell: pwsh
        run: |
          $patchRoot = Join-Path $PWD "patch-artifacts"
          if (Test-Path $patchRoot) {
            Remove-Item -Recurse -Force $patchRoot
          }
          New-Item -ItemType Directory -Path $patchRoot -Force | Out-Null
          Copy-Item -Path dist\*-delta-from-*.zip -Destination $patchRoot -Force -ErrorAction SilentlyContinue
          Copy-Item -Path dist\*-changes.json -Destination $patchRoot -Force

      - name: Upload Roku package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-roku-package-${{ steps.meta.outputs.release_id }}
          path: ${{ steps.meta.outputs.channel }}-roku.zip
          if-no-files-found: error

      - name: Upload super release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-super-release-${{ steps.meta.outputs.release_id }}
          path: super/src/WindowManager.App/bin/Release/**
          if-no-files-found: error

      - name: Upload versioned release patch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-versioned-release-artifacts-${{ steps.meta.outputs.release_id }}
          path: patch-artifacts/**
          if-no-files-found: error

      - name: Upload latest rokuweb manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-latest-rokuweb-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-rokuweb.json
          if-no-files-found: error

      - name: Upload latest super manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.channel }}-latest-super-json-${{ steps.meta.outputs.release_id }}
          path: dist/latest-super.json
          if-no-files-found: error

      - name: Prepare Pages content
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pagesRoot = Join-Path $PWD "pages-content"
          $updatesRoot = Join-Path $pagesRoot "updates"
          $channelRoot = Join-Path $updatesRoot "${{ steps.meta.outputs.channel }}"
          if (Test-Path $pagesRoot) {
            Remove-Item -Recurse -Force $pagesRoot
          }
          New-Item -ItemType Directory -Path $updatesRoot -Force | Out-Null
          $ghPagesExists = $false
          git ls-remote --exit-code origin gh-pages *> $null
          if ($LASTEXITCODE -eq 0) {
            $ghPagesExists = $true
          }
          $global:LASTEXITCODE = 0

          if ($ghPagesExists) {
            $ghPagesRoot = Join-Path $PWD "gh-pages-current"
            if (Test-Path $ghPagesRoot) {
              Remove-Item -Recurse -Force $ghPagesRoot
            }

            try {
              $originUrl = (git remote get-url origin).Trim()
              if (-not [string]::IsNullOrWhiteSpace($originUrl)) {
                git clone --depth 1 --branch gh-pages $originUrl $ghPagesRoot
                $cloneExitCode = $LASTEXITCODE
                if ($cloneExitCode -eq 0 -and (Test-Path $ghPagesRoot)) {
                  $items = Get-ChildItem -Force -Path $ghPagesRoot
                  foreach ($item in $items) {
                    if ($item.Name -eq '.git') {
                      continue
                    }

                    Copy-Item -Path $item.FullName -Destination $pagesRoot -Recurse -Force
                  }
                }
                else {
                  Write-Host "Nao foi possivel clonar gh-pages. exit=$cloneExitCode"
                }
              }
            }
            catch {
              Write-Host "Nao foi possivel reutilizar o conteudo anterior de gh-pages: $($_.Exception.Message)"
            }
            finally {
              $global:LASTEXITCODE = 0
              if (Test-Path $ghPagesRoot) {
                Remove-Item -Recurse -Force $ghPagesRoot
              }
            }
          }
          New-Item -ItemType Directory -Path $channelRoot -Force | Out-Null
          Copy-Item -Path dist\* -Destination $channelRoot -Recurse -Force
          if ('${{ steps.meta.outputs.channel }}' -eq 'stable') {
            Copy-Item -Path dist\latest-rokuweb.json -Destination (Join-Path $updatesRoot 'latest-rokuweb.json') -Force
            Copy-Item -Path dist\latest-super.json -Destination (Join-Path $updatesRoot 'latest-super.json') -Force
          }
          @"
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>rokuweb updates</title>
          </head>
          <body>
            <h1>rokuweb updates</h1>
            <ul>
              <li><a href="./updates/stable/latest-rokuweb.json">stable/latest-rokuweb.json</a></li>
              <li><a href="./updates/stable/latest-super.json">stable/latest-super.json</a></li>
              <li><a href="./updates/develop/latest-rokuweb.json">develop/latest-rokuweb.json</a></li>
              <li><a href="./updates/develop/latest-super.json">develop/latest-super.json</a></li>
            </ul>
          </body>
          </html>
          "@ | Set-Content -Path (Join-Path $pagesRoot "index.html") -Encoding UTF8
          exit 0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-content

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
