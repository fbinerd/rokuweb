; Ajustes locais de latencia/estabilidade do stream.
; Se uma chave faltar, o Super usa o valor padrao embutido no codigo.
; Tambem e possivel apontar outro arquivo via env var SUPERPAINEL_STREAM_CONFIG.

[stream]
; Duracao de cada segmento HLS em segundos.
hls_segment_duration_seconds=0.75

; Quantidade de segmentos mantidos na playlist HLS.
hls_playlist_size=3

; Resolucao, bitrate e fps do stream HLS principal.
hls_resolution=854x480
hls_video_bitrate=850000
hls_audio_bitrate=96000
hls_frame_rate=18

; Tamanho do bloco de audio empurrado ao ffmpeg, em milissegundos.
audio_chunk_interval_ms=100

; Ajuste fino de sincronismo do audio em relacao ao video.
; Negativo = audio toca antes.
; Positivo = audio toca depois.
audio_sync_offset_ms=0

; Janela maxima para considerar audio como "fresco".
audio_freshness_ms=450

; Buffer maximo de audio mantido em memoria.
audio_max_buffer_ms=900

; Quanto atraso de leitura de audio ainda toleramos antes de descartar backlog velho.
audio_max_live_read_lag_ms=900

; Vida util do frame em cache para o stream.
snapshot_cache_lifetime_ms=140

; Intervalo do loop de captura de snapshots.
snapshot_background_capture_interval_ms=66
